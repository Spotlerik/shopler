<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopler</title>
  <meta name="description" content="Shopler — quietly considered clothing from five independent labels. Demo storefront for Spotler Activate.">
  <link rel="icon" type="image/svg+xml" href="assets/shopler-monogram.svg">
  <!-- Brand fonts. Degrade gracefully to system-ui (declared in tokens.css) when offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header class="hdr" id="hdr"></header>
  <main id="app"></main>
  <footer class="ftr" id="ftr"></footer>

  <!-- Cart drawer -->
  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-label="Cart"></aside>

  <!-- Cookie / consent banner (wired to the Activate _sqzl consent API) -->
  <div id="consent"></div>

  <!-- Data loaded as scripts (mirrors of the JSON) so the shop runs from file:// without fetch/CORS. -->
  <script src="products.default.js"></script>
  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>
